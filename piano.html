           <param name="movie" value="https://www.youtube.com/v/KpOtuoHL45Y?version=2&theme=dark"/><param name="wmode" value="transparent"/>

<!-- Add Google Maps -->
<script>
function openMusic(evt, menuName) {
  var i, x, tablinks;
  x = document.getElementsByClassName("piano");
  for (i = 0; i < x.length; i++) {
     x[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablink");
  for (i = 0; i < x.length; i++) {
     tablinks[i].className = tablinks[i].className.replace(" w3-red", "");
  }
  document.getElementById(menuName).style.display = "block";
  evt.currentTarget.firstElementChild.className += " w3-red";
}
document.getElementById("musicLink").click();
</script>
